<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">PASS — Project Allrounder Skill Suite</title>
  <desc id="desc">Green and cyan pixel-terminal lettering for the Project Allrounder Skill Suite.</desc>
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#17352f" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="0" flood-color="#06110f" flood-opacity="0.9"/>
    </filter>
  </defs>

  <rect x="6" y="6" width="948" height="248" rx="18" fill="#071411" stroke="#2f6658" stroke-width="4"/>
  <rect x="18" y="18" width="924" height="224" rx="12" fill="url(#grid)"/>

  <circle cx="42" cy="39" r="7" fill="#ff6b6b"/>
  <circle cx="66" cy="39" r="7" fill="#ffd166"/>
  <circle cx="90" cy="39" r="7" fill="#83e377"/>
  <path d="M120 39H914" stroke="#28584b" stroke-width="2"/>

  <g filter="url(#shadow)" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="124" font-weight="900" text-anchor="middle">
    <text x="480" y="164" letter-spacing="10">
      <tspan fill="#a7f070">P</tspan><tspan fill="#63e6a9">A</tspan><tspan fill="#3dd9c2">S</tspan><tspan fill="#42c9f5">S</tspan>
    </text>
  </g>

  <g filter="url(#glow)" opacity="0.85">
    <rect x="163" y="179" width="634" height="2" fill="#45deb1"/>
    <rect x="219" y="188" width="522" height="2" fill="#238c78"/>
  </g>

  <text x="480" y="220" fill="#d8fff2" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="21" font-weight="700" text-anchor="middle" letter-spacing="5">PROJECT ALLROUNDER SKILL SUITE</text>
</svg>
